name: SonarQube Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  # Enables the "Run Workflow" button in Gitea
  workflow_dispatch: 

jobs:
  sonarqube:
    name: SonarQube Trigger
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Tests and Generate Coverage
        run: |
          # 1. Run tests
          go test -v ./internal/... -coverpkg=./internal/... -coverprofile=coverage.out -json > report.json || true
          
          # 2. Get your module name from go.mod (e.g., github.com/user/repo)
          MODNAME=$(go list -m)
          
          # 3. Strip the module name from the coverage file so paths start with 'internal/'
          sed -i "s|$MODNAME/||g" coverage.out
          
          # 4. Debug: Print the first few lines to the logs so we can verify
          head -n 5 coverage.out

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}