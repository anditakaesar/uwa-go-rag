{{define "title"}}Upload{{end}}

{{define "content"}}  
<div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Upload Media</h1>
    <p class="text-gray-500 mt-2">Select an image to upload to your gallery.</p>
</div>

<form method="POST" action="/upload" enctype="multipart/form-data" class="space-y-6">
    <input type="hidden" name="csrf_token" value="{{.CSRF}}">

    <div class="group relative border-2 border-dashed border-gray-300 rounded-xl p-12 text-center hover:border-blue-500 transition-colors">
        <input type="file" name="file" id="fileToUpload" accept="image/*" 
            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
        
        <div class="space-y-2">
            <svg class="mx-auto h-12 w-12 text-gray-400 group-hover:text-blue-500" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <div class="flex text-sm text-gray-600 justify-center">
                <span class="relative font-medium text-blue-600 hover:text-blue-500">Click to select a file</span>
                <p class="pl-1">or drag and drop</p>
            </div>
            <p class="text-xs text-gray-500">PNG, JPG, GIF up to 10MB</p>
        </div>
    </div>

    <button type="submit" 
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
        Upload
    </button>

    {{if .Error}}
        <div class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-sm text-red-600 text-center font-medium">{{.Error}}</p>
        </div>
    {{end}}

    {{if .Uploaded}}
        <div class="mt-8 pt-8 border-t border-gray-100">
            <p class="text-sm font-semibold text-green-600 mb-3 text-center">✓ Successfully Uploaded</p>
            <div class="flex flex-col items-center gap-4">
                <a href="{{.Uploaded}}" target="_blank" class="text-blue-600 hover:underline text-sm break-all">
                    {{.Uploaded}}
                </a>
                <div class="w-full max-w-sm overflow-hidden rounded-lg border border-gray-200 shadow-sm">
                    <img src="{{.Uploaded}}" class="w-full h-auto object-cover" alt="Uploaded Preview" />
                </div>
            </div>
        </div>
    {{end}}
</form>
{{end}}
