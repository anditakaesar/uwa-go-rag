{{define "title"}}Login Page{{end}}

{{define "content"}}
     
  <div class="max-w-md mx-auto bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <div class="mb-8 text-center">
        <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
        <p class="text-gray-500 mt-2">Please enter your credentials to log in.</p>
    </div>

    <form method="POST" action="/login" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{.CSRF}}">

        <div>
            <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">
                Username
            </label>
            <input type="text" name="username" value="admin" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>

        <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                Password
            </label>
            <input type="password" name="password" value="password" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>

        <button type="submit" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 shadow-md active:transform active:scale-[0.98]">
            Login
        </button>

        {{if .Error}}
            <div class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                <p class="text-sm text-red-600 text-center font-medium">{{.Error}}</p>
            </div>
        {{end}}
    </form>
  </div>
{{end}}
